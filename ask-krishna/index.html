<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Krishna</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">
    <div class="header">
        <div class="halo"></div>
        <h1>🪷 Ask Krishna</h1>
        <p>
            Every problem is another Kurukshetra.
        </p>
    </div>
    <div id="chat"></div>
    <form id="form">
        <textarea
            id="input"
            rows="1"
            placeholder="What troubles your mind, Arjuna?"
        ></textarea>
        <button>
            Seek Wisdom →
        </button>
    </form>
</div>
<script src="script.js"></script>
</body>
</html>
